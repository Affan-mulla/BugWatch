version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: pr-review-db
    restart: always
    environment:
      POSTGRES_USER: affan
      POSTGRES_PASSWORD: axon0023
      POSTGRES_DB: pr_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: